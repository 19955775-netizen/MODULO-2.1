<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario para Clientes</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff6ec4, #7873f5, #4ade80);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .contenedor {
      background: white;
      width: 90%;
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      color: #7873f5;
    }

    p {
      text-align: center;
      color: #555;
    }

    label {
      font-weight: bold;
      color: #333;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #ff6ec4, #7873f5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <h1>📝 Formulario para Clientes</h1>
    <p>Completa tus datos para solicitar información o un servicio.</p>

    <form>
      <label>Nombre completo:</label>
      <input type="text" placeholder="Escribe tu nombre completo" required>

      <label>Correo electrónico:</label>
      <input type="email" placeholder="Escribe tu correo" required>

      <label>Teléfono:</label>
      <input type="tel" placeholder="Escribe tu número de teléfono">

      <label>Dirección o ubicación:</label>
      <input type="text" placeholder="Escribe tu ubicación">

      <label>Servicio solicitado:</label>
      <select required>
        <option value="">Selecciona una opción</option>
        <option>Diseño web</option>
        <option>Base de datos</option>
        <option>Programa o sistema</option>
        <option>Consulta general</option>
      </select>

      <label>Mensaje:</label>
      <textarea placeholder="Escribe tu mensaje o consulta"></textarea>

      <button type="submit">Enviar formulario</button>
    </form>
  </div>

</body>
</html>
